<!DOCTYPE html>
<html lang="en">
<head>
    <title>Victor Quirit III | Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background-image: url("images/main-bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVBAR CONTAINER */
        .navbar {
            position: absolute;
            top: 20px;

            display: flex;
            gap: 20px;

            padding: 10px 20px;
            border-radius: 12px;

            background: rgba(163, 177, 138, 0.95);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        /* ALL BUTTONS SHARE SAME BACKGROUND IMAGE */
        .navbar a {
            text-decoration: none;
            color: #2f3b1f;

            font-size: 18px;
            font-weight: bold;

            padding: 10px 18px;
            border-radius: 10px;

            background-image: url("images/buttons-bg.png");
            background-size: cover;
            background-position: center;

            transition: 0.3s;
        }

        /* HOVER EFFECT */
        .navbar a:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* BIG TITLE BOX (FIXED SIZE LIKE YOU WANTED) */
        .hero {
            margin-top: 160px;

            padding: 70px;
            width: 750px;

            border-radius: 20px;

            background: rgba(163, 177, 138, 0.95);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);

            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin: 10px;
            color: #2f3b1f;
        }

        h2 {
            font-size: 24px;
            margin: 10px;
            color: #2f3b1f;
        }

        p {
            font-size: 18px;
            margin: 10px;
            color: #2f3b1f;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="midterm.html">Midterm / Final</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <h1>VICTOR QUIRIT III</h1>
        <h2>COMP 009 - OBJECT ORIENTED PROGRAMMING</h2>
        <p>BSIT 2-5</p>
    </div>

</body>
</html>
